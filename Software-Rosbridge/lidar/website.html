<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show</title>
  <style>
    :root{
      background: #00053d;
      font-size: 2rem;
    }
    body{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    .bigRadar{
      height: 70vh;
      aspect-ratio: 1 / 1;
      border: 2px solid white;
      border-radius: 100000px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 50%;
      left:50%;
      filter: opacity(0.8);
      transform: translate(-50%, -50%);
      .circleLayer {
        position: absolute;
        border: 2px solid white;
        border-radius: 100000px;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        box-sizing: border-box;
        transform-origin: center center;
      }
    }
    .radarPoint{
      animation: blink 1s linear forwards;
    }
    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    .originPoint{
      position: absolute;
      width: 5px;
      height: 5px;
      background: red;
      border-radius: 100000px;
      top: calc(50% - 5px);
      left: calc(50% - 5px);
      z-index: 10;
    }
    .menu{
      width: 60vw;
      position: absolute;
      top: 50%;
      left:50%;
      filter: opacity(0.8);
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column; 
      justify-content: space-around;
      align-items: center;
    }
    .menuItem{
      width: 100%;
      margin: 10px 0;
      padding: 1rem;
      border: 1px solid white;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: background 0.3s;
      background: white;
    }
    .menuItem:hover{
      background: rgb(197, 202, 255);
    }
    .controller {
      width: 400px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
    }
    .control {
      padding: 20px;
      margin: 10px;
      width: 100px;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .controlSplit {
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

  <div class="bigRadar" style="display: none;">

  <script>
    const menu = document.querySelector('.menu');
    const items = menu.querySelectorAll('.menuItem');
    const returnButton = document.querySelector('.returnButton');
    const controller = document.querySelector('.controller')
    const bigRadar = document.querySelector('.bigRadar');
    items[0].addEventListener('click', () => {
      returnButton.style.display = 'block';

      controller.style.display = 'block';
      menu.style.display = 'none';
      bigRadar.style.display = 'none';
      bigRadar.querySelectorAll('*').forEach(e => e.style.display = 'none');
    });
    items[1].addEventListener('click', () => {
      returnButton.style.display = 'block';
      controller.style.display = 'none';
      menu.style.display = 'none';
      
      bigRadar.style.display = 'block';
      bigRadar.querySelectorAll('*').forEach(e => e.style.display = 'block');
    });
    returnButton.addEventListener('click', () => {
      controller.style.display = 'none';
      bigRadar.style.display = 'none';
      menu.style.display = 'flex';
      returnButton.style.display = 'none';
    });
    let lastCircle = bigRadar;
    let lastCircleSize = lastCircle.getBoundingClientRect().width;
    for (let i = 0; i < 10; i++) {
      const newCircle = lastCircle.cloneNode();
      newCircle.style.transform = `scale(${1 - i * 0.1})`;
      newCircle.style.borderWidth = `${2 + i * 0.5}px`; // Increment border width for each
      newCircle.classList.add('circleLayer');
      bigRadar.appendChild(newCircle);
      lastCircle = newCircle;
    }
    const origin = [50, 50];
    const originPoint = document.createElement('div');
    originPoint.classList.add('originPoint');
    originPoint.style.top = `${origin[1]}%`;
    originPoint.style.transform = 'translate(-50%, -50%)';
    originPoint.style.left = `${origin[0]}%`;
    bigRadar.appendChild(originPoint);
    function addPoint(x, y) {
      const point = document.createElement('div');
      point.style.position = 'absolute';
      point.style.width = '6px';
      point.style.height = '6px';
      point.style.background = 'lime';
      point.style.filter = 'opacity(1)'
      point.style.borderRadius = '100000px';
      point.style.left = `calc(${x}% - 3px)`;
      point.style.top = `calc(${y}% - 3px)`;
      
      point.style.transform = 'translate(-50%, -50%)';
      point.classList.add('radarPoint');
      bigRadar.appendChild(point);
      // Desaparecer después de 1s
      setTimeout(() => {
        point.style.opacity = '0';
      }, 1000);

      // Eliminar del DOM después de 1.5s
      setTimeout(() => {
        point.remove();
      }, 1500);
      return point
    }
    // Example points
    setInterval(() => {
      const angle = Math.random() * 360; // random angle in radians
      const radius = Math.random() * 100;         // max 50% of radar radius
      const [x, y] = distanceAngleToXY(radius, angle);

      addPoint(x, y);
    }, 10); // one point every 200ms
    function distanceAngleToXY(distance, angle) { // Angle in degrees, distance in % of radar radius
      angle = - angle * Math.PI / 180;
      distance = distance * 0.5; // Convert to % of radar diameter
      const x = origin[0] + distance * Math.cos(angle);
      const y = origin[1] + distance * Math.sin(angle);
      return [x, y];
    }
  </script>
